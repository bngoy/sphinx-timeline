name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # triggered by tag.yml, or run manually

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing (optional, used as fallback)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}  # ensure the tag ref is checked out

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match VERSION file ($VERSION)"
            exit 1
          fi

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
